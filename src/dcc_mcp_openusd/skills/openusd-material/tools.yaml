tools:
  - name: create_material
    description: Create a UsdShadeMaterial prim in the stage.
    input_schema:
      type: object
      required: [stage_file, prim_path]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        prim_path:
          type: string
          description: Absolute prim path for the material, e.g. /World/Mat.
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/create_material.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - openusd_material__create_preview_surface
        - openusd_stage__list_stage

  - name: create_preview_surface
    description: Create a UsdPreviewSurface shader and connect it to a material's surface output.
    input_schema:
      type: object
      required: [stage_file, material_path]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        material_path:
          type: string
          description: Prim path of the material to attach the shader to.
        shader_path:
          type: string
          description: Optional prim path for the shader (defaults to <material_path>/Shader).
        diffuse_color:
          type: array
          items:
            type: number
          description: RGB diffuse color as [r, g, b].
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/create_preview_surface.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - openusd_material__bind_material
        - openusd_stage__list_stage

  - name: bind_material
    description: Bind a UsdShadeMaterial to a target prim.
    input_schema:
      type: object
      required: [stage_file, prim_path, material_path]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        prim_path:
          type: string
          description: Prim to bind the material onto.
        material_path:
          type: string
          description: Material prim path (created via create_material).
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/bind_material.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - openusd_stage__list_stage
