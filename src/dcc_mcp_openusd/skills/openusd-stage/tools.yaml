tools:
  - name: create_stage
    description: Create a minimal OpenUSD stage with /World as defaultPrim.
    input_schema:
      type: object
      required: [stage_file]
      properties:
        stage_file:
          type: string
          description: Output .usda/.usd stage path.
        name:
          type: string
          default: scene
          description: Stage display name.
        up_axis:
          type: string
          enum: [X, Y, Z]
          default: Y
        meters_per_unit:
          type: number
          default: 1.0
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/create_stage.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - openusd_stage__list_stage
        - openusd_validate__validate_stage

  - name: list_stage
    description: List prims and basic metadata for an OpenUSD stage.
    input_schema:
      type: object
      required: [stage_file]
      properties:
        stage_file:
          type: string
          description: Stage file to inspect.
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/list_stage.py
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true

  - name: define_prim
    description: Define a USD prim with an arbitrary type, preserving nested hierarchy.
    input_schema:
      type: object
      required: [stage_file, prim_path]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        prim_path:
          type: string
          description: Absolute prim path, for example /World/Chair.
        prim_type:
          type: string
          default: Xform
          description: USD prim type name (e.g. Xform, Mesh, SphereLight, Material).
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/define_prim.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - openusd_stage__list_stage
        - openusd_validate__validate_stage

  - name: define_xform
    description: Define an Xform prim in the stage. Convenience wrapper around define_prim.
    input_schema:
      type: object
      required: [stage_file, prim_path]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        prim_path:
          type: string
          description: Absolute prim path, for example /World/Chair.
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/define_xform.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - openusd_stage__list_stage
        - openusd_validate__validate_stage

  - name: set_xform_ops
    description: Set translate/rotate/scale xform operations on a prim.
    input_schema:
      type: object
      required: [stage_file, prim_path]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        prim_path:
          type: string
          description: Absolute prim path with an existing Xformable prim.
        translate:
          type: array
          items:
            type: number
          minItems: 3
          maxItems: 3
          description: Translate as [x, y, z].
        rotate:
          type: array
          items:
            type: number
          minItems: 3
          maxItems: 3
          description: RotateXYZ as [x, y, z] in degrees.
        scale:
          type: array
          items:
            type: number
          minItems: 3
          maxItems: 3
          description: Scale as [x, y, z].
    read_only: false
    destructive: false
    idempotent: false
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/set_xform_ops.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    next-tools:
      on-success:
        - openusd_stage__list_stage
        - openusd_validate__validate_stage

  - name: set_stage_metadata
    description: Modify stage-level metadata such as upAxis, metersPerUnit, doc, and framesPerSecond.
    input_schema:
      type: object
      required: [stage_file]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        up_axis:
          type: string
          enum: [X, Y, Z]
          description: Stage up axis.
        meters_per_unit:
          type: number
          description: Meters per unit (1.0 = meter, 0.01 = centimeter).
        doc:
          type: string
          description: Documentation string for the stage.
        frames_per_second:
          type: number
          description: Frames per second for the stage.
    read_only: false
    destructive: false
    idempotent: false
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/set_stage_metadata.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    next-tools:
      on-success:
        - openusd_stage__list_stage

  - name: add_reference
    description: Define a prim and add a reference arc to an external USD asset.
    input_schema:
      type: object
      required: [stage_file, prim_path, asset_path]
      properties:
        stage_file:
          type: string
          description: Stage file to mutate.
        prim_path:
          type: string
          description: Absolute prim path to define.
        asset_path:
          type: string
          description: Referenced asset path.
        prim_type:
          type: string
          default: Xform
          description: USD prim type to define for the reference.
    read_only: false
    destructive: false
    idempotent: false
    execution: sync
    timeout_hint_secs: 30
    source_file: scripts/add_reference.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    next-tools:
      on-success:
        - openusd_stage__list_stage
        - openusd_validate__validate_stage
