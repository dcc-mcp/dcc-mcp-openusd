tools:
  - name: validate_stage
    description: Validate stage metadata and basic OpenUSD invariants.
    input_schema:
      type: object
      required: [stage_file]
      properties:
        stage_file:
          type: string
          description: Stage file to validate.
        strict:
          type: boolean
          default: false
          description: Treat missing production metadata as errors.
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 60
    source_file: scripts/validate_stage.py
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true

  - name: package_usdz
    description: Package a stage into a USDZ-style archive.
    input_schema:
      type: object
      required: [stage_file, output_file]
      properties:
        stage_file:
          type: string
          description: Stage file to package.
        output_file:
          type: string
          description: Destination .usdz path.
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    timeout_hint_secs: 120
    source_file: scripts/package_usdz.py
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - openusd_validate__validate_stage
