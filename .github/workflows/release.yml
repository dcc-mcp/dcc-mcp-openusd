name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for manual asset build, for example v0.1.0. Leave empty to only run release-please."
        required: false
        default: ""
      publish_to_pypi:
        description: "Publish rebuilt dist artifacts for tag_name to PyPI. Use to backfill an existing GitHub release."
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}${{ inputs.tag_name && format('-{0}', inputs.tag_name) || '' }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  actions: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || inputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '' && inputs.publish_to_pypi == true)
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-openusd
    permissions:
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI with trusted publishing
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
      - name: Publish to PyPI with API token
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          print-hash: true

  attach-release-assets:
    name: Attach GitHub Release assets
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Attach assets to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
          files: dist/*
