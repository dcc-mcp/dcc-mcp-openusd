name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release-please--branches--**"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Skill Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/ tools/
      - name: Ruff format check
        run: ruff format --check src/ tests/ tools/
      - name: Validate bundled skills
        run: python tools/lint_skills.py --warnings-as-errors

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
        exclude:
          - os: windows-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.9"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest

  test-minimal:
    name: Minimal (no pxr) — Unit + Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package with dev deps (no pxr)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Verify pxr is absent
        shell: bash
        run: |
          python -c "from dcc_mcp_openusd.runtime import detect_runtime; rt=detect_runtime(); assert not rt.has_pxr, 'pxr should be absent in minimal job'; print('pxr absent — OK')"
      - name: Run unit tests + contract test
        run: python -m pytest tests/ --ignore=tests/e2e

  test-openusd:
    name: OpenUSD (with pxr) — E2E Golden Paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package with dev + openusd deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,openusd]"
      - name: Verify pxr is present
        shell: bash
        run: |
          python -c "from dcc_mcp_openusd.runtime import detect_runtime; rt=detect_runtime(); assert rt.has_pxr, 'pxr must be present in openusd job'; print(f'pxr present — {rt.version}')"
      - name: Run e2e golden path tests
        run: python -m pytest tests/e2e/ -v

  build:
    name: Build Wheel and Sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - name: Verify wheel contains bundled skills
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheels = sorted(glob.glob("dist/dcc_mcp_openusd-*.whl"))
          assert wheels, "wheel missing"
          with zipfile.ZipFile(wheels[-1]) as zf:
              names = set(zf.namelist())
          required = {
              "dcc_mcp_openusd/skills/openusd-project/SKILL.md",
              "dcc_mcp_openusd/skills/openusd-stage/SKILL.md",
              "dcc_mcp_openusd/skills/openusd-validate/SKILL.md",
          }
          missing = sorted(required - names)
          assert not missing, missing
          PY
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
